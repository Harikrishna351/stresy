<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Breathe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 2rem;
        }

        .breathing-circle {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            margin: 3rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(10px);
            animation: breathe 8s infinite ease-in-out;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
                box-shadow: 0 0 80px rgba(255, 255, 255, 0.3);
            }
        }

        .message {
            font-size: 1.5rem;
            font-weight: 300;
            opacity: 0.9;
            min-height: 2rem;
            transition: opacity 1s;
        }

        .affirmation {
            margin-top: 3rem;
            font-size: 1.1rem;
            opacity: 0.7;
            font-style: italic;
            max-width: 400px;
            line-height: 1.6;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .gentle-text {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="breathing-circle">
            <span style="font-size: 3rem; opacity: 0.8;">🌙</span>
        </div>

        <div class="message" id="message">Breathe in...</div>

        <div class="affirmation" id="affirmation">
            You don't have to solve everything right now.<br>
            You just have to breathe.
        </div>
    </div>

    <div class="gentle-text">
        This moment is just for you. Take your time.
    </div>

    <script>
        // Breathing messages
        const messages = [
            { text: "Breathe in...", duration: 4000 },
            { text: "Hold...", duration: 2000 },
            { text: "Breathe out...", duration: 4000 },
            { text: "Rest...", duration: 2000 }
        ];

        const affirmations = [
            "You are doing better than you think.",
            "It's okay to pause. The world can wait.",
            "You don't have to be perfect to be worthy.",
            "This feeling is temporary. You are not.",
            "Be gentle with yourself.",
            "You have survived 100% of your hardest days.",
            "It's okay to not be okay right now."
        ];

        let messageIndex = 0;
        const messageEl = document.getElementById('message');
        const affirmationEl = document.getElementById('affirmation');

        function cycleMessages() {
            const current = messages[messageIndex];
            messageEl.style.opacity = '0';

            setTimeout(() => {
                messageEl.textContent = current.text;
                messageEl.style.opacity = '0.9';
                messageIndex = (messageIndex + 1) % messages.length;
            }, 500);

            setTimeout(cycleMessages, current.duration);
        }

        // Change affirmation every 30 seconds
        setInterval(() => {
            affirmationEl.style.opacity = '0';
            setTimeout(() => {
                affirmationEl.innerHTML = affirmations[Math.floor(Math.random() * affirmations.length)] + "<br>You just have to breathe.";
                affirmationEl.style.opacity = '0.7';
            }, 1000);
        }, 30000);

        // Create floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }

        // Start breathing cycle
        setTimeout(cycleMessages, 1000);

        // Click to change affirmation
        document.body.addEventListener('click', () => {
            affirmationEl.style.opacity = '0';
            setTimeout(() => {
                affirmationEl.innerHTML = affirmations[Math.floor(Math.random() * affirmations.length)] + "<br>You just have to breathe.";
                affirmationEl.style.opacity = '0.7';
            }, 500);
        });
    </script>
</body>
</html>
